server:
  port: 8082

spring:
  application:
    name: orders

  datasource:
    url: jdbc:postgresql://localhost:5432/market_orders_db
    username: ${MARKET_USER}
    password: ${MARKET_PASS}
    driver-class-name: org.postgresql.Driver

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
    show-sql: true

